services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-travel_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel_pass}
            POSTGRES_DB: ${POSTGRES_DB:-travel_db}
        ports:
            - '5433:5432'
        volumes:
            - travel_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U travel_user -d travel_db']
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: travel_app
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        env_file:
            - ../.env.local
        environment:
            DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_db
        ports:
            - '3001:3000'
        volumes:
            - ../logs:/app/logs

volumes:
    travel_postgres_data:
